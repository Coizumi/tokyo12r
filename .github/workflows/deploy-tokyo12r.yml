name: Deploy TOKYO12R to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Target date in JST (YYYY-MM-DD). Defaults to today."
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "assets/**"
      - "scripts/jra_site_updater.py"
      - ".github/workflows/deploy-tokyo12r.yml"

concurrency:
  group: tokyo12r-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SITE_OUTPUT: site-dist
      TZ: Asia/Tokyo
      R2_BUCKET: byzin-nar-results

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade beautifulsoup4

      - name: Generate site
        run: |
          args=(--output "$SITE_OUTPUT" --fetch-official)
          if [ -n "${{ inputs.date }}" ]; then
            args+=(--date "${{ inputs.date }}")
          fi
          python scripts/jra_site_updater.py "${args[@]}"

      - name: Resolve generated date key
        id: datekey
        shell: bash
        run: |
          set -euo pipefail
          data_file="$(ls "$SITE_OUTPUT"/public-data*.json | sort | tail -n 1)"
          filename="$(basename "$data_file")"
          date_key="${filename#public-data}"
          date_key="${date_key%.json}"
          echo "date_key=$date_key" >> "$GITHUB_OUTPUT"
          echo "data_file=$data_file" >> "$GITHUB_OUTPUT"

      - name: Upload public JSON to Cloudflare R2
        if: ${{ vars.ENABLE_R2_ARCHIVE == 'true' }}
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATE_KEY: ${{ steps.datekey.outputs.date_key }}
          DATA_FILE: ${{ steps.datekey.outputs.data_file }}
        shell: bash
        run: |
          set -euo pipefail
          year="${DATE_KEY:0:4}"
          month="${DATE_KEY:4:2}"
          day="${DATE_KEY:6:2}"
          npx --yes wrangler@latest r2 object put "${R2_BUCKET}/jra/daily/${year}/${month}/${day}/public-data${DATE_KEY}.json" \
            --remote \
            --file "$DATA_FILE" \
            --content-type "application/json; charset=utf-8"
          npx --yes wrangler@latest r2 object put "${R2_BUCKET}/jra/latest/public-data.json" \
            --remote \
            --file "$DATA_FILE" \
            --content-type "application/json; charset=utf-8"

      - name: Ensure Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages project create tokyo12r \
            --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy "$SITE_OUTPUT" \
            --project-name=tokyo12r \
            --branch="${GITHUB_REF_NAME:-main}"

      - name: Ensure custom domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl --fail-with-body --request POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/tokyo12r/domains" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"name":"tokyo12r.byzin.win"}' || true

      - name: Ensure DNS record
        continue-on-error: true
        env:
          CLOUDFLARE_DNS_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
        run: |
          auth_header="Authorization: Bearer ${CLOUDFLARE_DNS_API_TOKEN}"
          zone_response=$(curl --fail-with-body --silent --show-error --get \
            "https://api.cloudflare.com/client/v4/zones" \
            --header "$auth_header" \
            --header "Content-Type: application/json" \
            --data-urlencode "name=byzin.win")
          zone_id=$(echo "$zone_response" | jq -r '.result[0].id // empty')
          if [ -z "$zone_id" ]; then
            echo "Cloudflare zone byzin.win was not found."
            exit 1
          fi

          record_name="tokyo12r.byzin.win"
          record_content="tokyo12r.pages.dev"
          record_response=$(curl --fail-with-body --silent --show-error --get \
            "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records" \
            --header "$auth_header" \
            --header "Content-Type: application/json" \
            --data-urlencode "type=CNAME" \
            --data-urlencode "name=${record_name}")
          record_id=$(echo "$record_response" | jq -r '.result[0].id // empty')
          current_content=$(echo "$record_response" | jq -r '.result[0].content // empty')
          current_proxied=$(echo "$record_response" | jq -r '.result[0].proxied // empty')
          payload=$(jq -n \
            --arg type "CNAME" \
            --arg name "$record_name" \
            --arg content "$record_content" \
            '{type:$type,name:$name,content:$content,ttl:1,proxied:true}')

          if [ -n "$record_id" ]; then
            if [ "$current_content" = "$record_content" ] && [ "$current_proxied" = "true" ]; then
              echo "${record_name} already points to ${record_content}."
            else
              curl --fail-with-body --silent --show-error --request PUT \
                "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records/${record_id}" \
                --header "$auth_header" \
                --header "Content-Type: application/json" \
                --data "$payload"
            fi
          else
            curl --fail-with-body --silent --show-error --request POST \
              "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records" \
              --header "$auth_header" \
              --header "Content-Type: application/json" \
              --data "$payload"
          fi
